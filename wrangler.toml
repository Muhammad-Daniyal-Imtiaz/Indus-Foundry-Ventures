name = "indus-foundry-ventures"
compatibility_date = "2026-04-27"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".open-next"

[vars]
# Non-secret runtime config (secrets go in Cloudflare Pages dashboard → Settings → Environment Variables)

# ── KV namespace for job search cache ────────────────────────────────────────
# Your SEARCH_CACHE KV namespace is already created.
# 1. Go to Cloudflare dashboard → Workers & Pages → KV
# 2. Find "SEARCH_CACHE" and copy its Namespace ID
# 3. Paste the ID below and uncomment the block
# 4. Also bind it in Cloudflare Pages: Settings → Functions → KV namespace bindings
#    binding = SEARCH_CACHE, namespace = <your namespace>

[[kv_namespaces]]
binding = "SEARCH_CACHE"
id = "e02802bd694540a4b2e5fe5ff06ae888"
